ja:
  date:
    formats:
      default: "%Y/%m/%d"
      long: "%Y年%-m月%-d日"
      short: "%-m月%-d日"
  time:
    formats:
      default: "%Y/%m/%d %H:%M"
      long: "%Y年%-m月%-d日 %H:%M"
      short: "%-m月%-d日 %H:%M"
  reminder:
    status:
      pending: "未送信"
      sent: "送信済み"
      failed: "送信失敗"
